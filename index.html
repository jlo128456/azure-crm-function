<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prefect Agencies — Job Status</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <div class="brand">
      <div class="brand-mark">P</div>
      <span class="brand-name">Jeff's CRM Azure demo</span>
    </div>
    <div class="status-bar">
      <div class="live-dot"></div>
      Live · Azure · Australia East
    </div>
  </div>

  <div class="hero">
    <div class="eyebrow">Field Service Operations</div>
    <h1>Job Status<br><em>Dashboard</em></h1>
    <div class="hero-meta">
      <span class="meta-chip">Azure Function App</span>
      <span class="meta-chip">Azure SQL Database</span>
      <span class="meta-chip">Node.js · mssql</span>
    </div>
  </div>

  <div class="search-section">
    <label class="search-label" for="jobInput">Job ID lookup</label>
    <div class="input-row">
      <input id="jobInput" class="search-input" type="text"
        placeholder="e.g. JOB-001" value="JOB-001"
        onkeydown="if(event.key==='Enter') lookup()"/>
      <button class="search-btn" id="btn" onclick="lookup()">Search</button>
    </div>
    <div class="quick-row">
      <span class="quick-label">Try:</span>
      <span class="qpill" onclick="go('JOB-001')">JOB-001</span>
      <span class="qpill" onclick="go('JOB-002')">JOB-002</span>
      <span class="qpill" onclick="go('JOB-003')">JOB-003</span>
    </div>
  </div>

  <div class="rule"></div>
  <div id="result"></div>

  <div class="page-footer">
    <div>
      <div class="footer-label">Stack</div>
      <div class="footer-chips">
        <span class="fc hi">Azure Function App</span>
        <span class="fc hi">Azure SQL</span>
        <span class="fc">Node.js</span>
        <span class="fc">Australia East</span>
        <span class="fc">Jeffrey Lo · 2026</span>
      </div>
    </div>
  </div>

</div>
<script>
const API = 'https://jlo128456crm-f5hvczhrh0dcbqg5.australiaeast-01.azurewebsites.net/api/job-status';

function go(id){ document.getElementById('jobInput').value=id; lookup(); }

function chipClass(s){
  if(!s) return 'b-default';
  const m=s.toLowerCase().replace(/\s+/g,'_');
  return {in_progress:'b-progress',completed:'b-completed',pending:'b-pending'}[m]||'b-default';
}

function fmtDate(d){
  if(!d) return '—';
  try{ return new Date(d).toLocaleString('en-AU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch{ return d; }
}

function showLoad(){
  document.getElementById('result').innerHTML=`
    <div class="loading-row">
      <div class="spinner"></div>
      Querying Azure SQL...
    </div>`;
}

function showErr(msg,detail){
  document.getElementById('result').innerHTML=`
    <div class="err-block">
      <div class="err-icon">⚠</div>
      <div>
        <div class="err-title">${msg}</div>
        ${detail?`<div class="err-detail">${detail}</div>`:''}
      </div>
    </div>`;
}

function showJob(j){
  const label=(j.status||'unknown').replace(/_/g,' ');
  document.getElementById('result').innerHTML=`
    <div class="job-card">
      <div class="card-header">
        <span class="card-id">${j.job_id||'—'}</span>
        <span class="badge ${chipClass(j.status)}">
          <span class="dot"></span>${label}
        </span>
      </div>
      <div class="card-body">
        <div>
          <div class="field-lbl">Job ID</div>
          <div class="field-val code">${j.job_id||'—'}</div>
        </div>
        <div>
          <div class="field-lbl">Status</div>
          <div class="field-val">${label}</div>
        </div>
        <div>
          <div class="field-lbl">Technician</div>
          <div class="field-val">${j.technician||'—'}</div>
        </div>
        <div>
          <div class="field-lbl">Venue</div>
          <div class="field-val">${j.venue||'—'}</div>
        </div>
        <div style="grid-column:1/-1">
          <div class="field-lbl">Created</div>
          <div class="field-val">${fmtDate(j.created_at)}</div>
        </div>
      </div>
      <div class="card-footer">
        <div class="footer-left">
          <span class="footer-live">●</span>
          Live · jlo-crm-server.database.windows.net
        </div>
        <span class="footer-right">Azure SQL · Free tier</span>
      </div>
    </div>`;
}

async function lookup(){
  const id=document.getElementById('jobInput').value.trim();
  if(!id){ showErr('Enter a job ID'); return; }
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='Searching...';
  showLoad();
  try{
    const res=await fetch(`${API}?job_id=${encodeURIComponent(id)}`);
    const data=await res.json();
    if(res.status===404) showErr('Job not found',`No record for "${id}"`);
    else if(!res.ok) showErr('Database error',data.detail||data.error||'Unknown error');
    else showJob(data);
  }catch(e){
    showErr('Connection failed','Could not reach the Azure Function App');
  }finally{
    btn.disabled=false; btn.textContent='Search';
  }
}

window.onload=()=>lookup();
</script>
</body>
</html>
